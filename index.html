<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly - Interactive Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Wordly</h1>
            <p>Your instant language companion</p>
        </header>

        <form id="search-form">
            <input type="text" id="search-input" placeholder="Enter a word..." required>
            <button type="submit" id="search-btn">Search</button>
        </form>

        <main id="result-container">
            <p class="placeholder">Search for a word to see definitions, synonyms, and more.</p>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
